<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="tile" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1c2c20"/>
      <stop offset="1" stop-color="#0f1411"/>
    </linearGradient>
    <linearGradient id="leaf" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0" stop-color="#2a5a3a"/>
      <stop offset="0.55" stop-color="#5fbf72"/>
      <stop offset="1" stop-color="#9fd8a8"/>
    </linearGradient>
    <linearGradient id="leaf2" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0" stop-color="#3a7a4a"/>
      <stop offset="1" stop-color="#7ec88a"/>
    </linearGradient>
  </defs>
  <rect width="64" height="64" rx="15" fill="url(#tile)"/>
  <rect x="0.75" y="0.75" width="62.5" height="62.5" rx="14.25" fill="none" stroke="#233328" stroke-width="1.5"/>
  <!-- bonsai pot -->
  <path d="M24 46 L40 46 L37.5 54 L26.5 54 Z" fill="#2a2418" stroke="#4a4030" stroke-width="0.8"/>
  <rect x="23" y="44" width="18" height="3" rx="1" fill="#3a3220"/>
  <!-- trunk -->
  <path d="M31 44 C 30 38, 33 35, 31.5 30 C 30.5 26, 33 24, 32 20" fill="none" stroke="#6a5238" stroke-width="2.4" stroke-linecap="round"/>
  <!-- origami canopy: folded leaves -->
  <path d="M32 12 L44 22 L32 26 Z" fill="url(#leaf)"/>
  <path d="M32 12 L20 22 L32 26 Z" fill="url(#leaf2)"/>
  <path d="M32 26 L46 30 L34 34 Z" fill="url(#leaf2)" opacity="0.92"/>
  <path d="M32 26 L18 30 L30 34 Z" fill="url(#leaf)" opacity="0.88"/>
  <path d="M32 20 L40 30 L32 32 L24 30 Z" fill="#9fd8a8" opacity="0.5"/>
  <!-- fold creases -->
  <path d="M32 12 L32 26" stroke="#0a140c" stroke-width="0.6" opacity="0.35"/>
  <path d="M32 26 L32 34" stroke="#0a140c" stroke-width="0.5" opacity="0.3"/>
  <!-- gold leaf vein spark -->
  <circle cx="44" cy="16" r="1.8" fill="#e8c842"/>
  <circle cx="18" cy="44" r="1.2" fill="#e8c842" opacity="0.7"/>
</svg>
